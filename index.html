<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChitChatter Fork — P2P Video + Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #21262d;
      --border:   #30363d;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --red:      #f85149;
      --yellow:   #d29922;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --radius:   10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 1rem;
    }
    .logo {
      display: flex; align-items: center; gap: 0.5rem;
      font-weight: 700; font-size: 1rem; color: var(--accent); white-space: nowrap;
    }
    #room-display {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); border-radius: var(--radius);
      padding: 0.3rem 0.7rem; font-size: 0.8rem; max-width: 260px; width: 100%;
    }
    #status-pill {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.78rem; color: var(--muted); white-space: nowrap;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--yellow); transition: background 0.4s;
    }
    #status-dot.online { background: var(--green); }
    #status-dot.error  { background: var(--red); }

    /* ── BODY LAYOUT ── */
    #body {
      display: flex; flex: 1; overflow: hidden;
    }

    /* ── LEFT: VIDEO GRID + CONTROLS ── */
    #video-panel {
      display: flex; flex-direction: column;
      width: 55%; border-right: 1px solid var(--border);
      background: #090c10; overflow: hidden; flex-shrink: 0;
    }

    #video-grid {
      flex: 1; display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 4px; padding: 6px; overflow-y: auto; align-content: start;
    }

    .video-tile {
      position: relative; background: #000;
      border-radius: 8px; overflow: hidden;
      aspect-ratio: 16/9;
    }
    .video-tile video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .video-tile .tile-label {
      position: absolute; bottom: 6px; left: 8px;
      background: rgba(0,0,0,0.6); color: #fff;
      font-size: 0.72rem; padding: 2px 7px; border-radius: 4px;
      pointer-events: none;
    }
    .video-tile .muted-icon {
      position: absolute; top: 6px; right: 8px;
      background: rgba(248,81,73,0.85); color: #fff;
      font-size: 0.65rem; padding: 2px 6px; border-radius: 4px;
      display: none;
    }
    .video-tile.mic-muted .muted-icon { display: block; }
    .video-tile.cam-off video { display: none; }
    .video-tile.cam-off::after {
      content: '📷 off';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 0.9rem;
    }

    #media-controls {
      display: flex; align-items: center; justify-content: center;
      gap: 0.75rem; padding: 0.7rem 1rem;
      border-top: 1px solid var(--border); background: var(--surface);
      flex-shrink: 0;
    }

    .ctrl-btn {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--surface2);
      color: var(--text); cursor: pointer; font-size: 1.1rem;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }
    .ctrl-btn:hover  { background: var(--border); }
    .ctrl-btn:active { transform: scale(0.92); }
    .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
    .ctrl-btn.danger { background: var(--red);    border-color: var(--red);    color: #fff; }
    .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #call-label { font-size: 0.78rem; color: var(--muted); margin-left: 0.5rem; }

    /* ── RIGHT: SIDEBAR + CHAT ── */
    #right-panel {
      display: flex; flex-direction: column; flex: 1; overflow: hidden;
    }

    /* peers sidebar */
    #sidebar {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .sidebar-label {
      font-size: 0.68rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem;
    }
    #peers-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .peer-chip {
      display: flex; align-items: center; gap: 0.35rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.2rem 0.6rem; font-size: 0.78rem;
    }
    .peer-chip .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    }
    .peer-chip.me { border-color: var(--accent); color: var(--accent); }

    /* trackers */
    #tracker-bar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.3rem 1rem; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
    }
    .t-label { font-size: 0.68rem; color: var(--muted); font-weight: 600; }
    .t-chip {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.68rem; color: var(--muted);
    }
    .t-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--yellow);
    }
    .t-dot.ok  { background: var(--green); }
    .t-dot.err { background: var(--red); }

    /* messages */
    #messages {
      flex: 1; overflow-y: auto; padding: 0.9rem 1rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .msg { display: flex; flex-direction: column; max-width: 80%; animation: fadeUp 0.2s ease-out; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg.mine   { align-self: flex-end; }
    .msg.theirs { align-self: flex-start; }
    .msg.system { align-self: center; max-width: 100%; }
    .msg-meta {
      font-size: 0.68rem; color: var(--muted);
      margin-bottom: 0.18rem; display: flex; gap: 0.4rem; align-items: baseline;
    }
    .msg.mine .msg-meta { justify-content: flex-end; }
    .msg-author { font-weight: 600; color: var(--accent); }
    .msg.mine .msg-author { color: var(--green); }
    .msg-bubble {
      padding: 0.5rem 0.8rem; border-radius: 14px;
      font-size: 0.875rem; line-height: 1.5; word-break: break-word; white-space: pre-wrap;
    }
    .msg.mine   .msg-bubble { background: #1f4068; border-bottom-right-radius: 4px; }
    .msg.theirs .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.system .msg-bubble { background: transparent; color: var(--muted); font-size: 0.75rem; font-style: italic; text-align: center; padding: 0.15rem 0; }

    /* input bar */
    #input-bar {
      display: flex; align-items: flex-end; gap: 0.5rem;
      padding: 0.65rem 1rem; border-top: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    #nick-wrap { display: flex; flex-direction: column; gap: 0.18rem; }
    #nick-wrap label { font-size: 0.65rem; color: var(--muted); }
    #nickname {
      width: 110px; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius); padding: 0.4rem 0.6rem;
      font-size: 0.82rem; outline: none;
    }
    #nickname:focus { border-color: var(--accent); }
    #msg-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius); padding: 0.5rem 0.8rem;
      font-size: 0.875rem; outline: none; resize: none; line-height: 1.5;
      max-height: 100px; font-family: inherit; transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      background: var(--accent); color: #000; border: none;
      border-radius: var(--radius); padding: 0.5rem 1rem;
      font-size: 0.875rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s; align-self: flex-end;
    }
    #send-btn:hover   { opacity: 0.85; }
    #send-btn:active  { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── JOIN OVERLAY ── */
    #join-overlay {
      position: fixed; inset: 0; background: rgba(13,17,23,0.93);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(4px);
    }
    #join-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem 2.25rem; width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 1.1rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    #join-card h2 { font-size: 1.35rem; color: var(--accent); display: flex; align-items: center; gap: 0.5rem; }
    #join-card p  { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
    .field input {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius); padding: 0.55rem 0.8rem;
      font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }
    #join-btn {
      background: var(--accent); color: #000; border: none;
      border-radius: var(--radius); padding: 0.65rem; font-size: 0.95rem;
      font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    #join-btn:hover { opacity: 0.85; }
    .hint { font-size: 0.72rem; color: var(--muted); text-align: center; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 640px) {
      #video-panel { width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
      #body { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- JOIN OVERLAY -->
<div id="join-overlay">
  <div id="join-card">
    <h2>
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      ChitChatter Fork
    </h2>
    <p>Serverless, encrypted, ephemeral P2P video + text chat. No server stores your data.</p>
    <div class="field">
      <label for="join-nickname">Your nickname</label>
      <input id="join-nickname" type="text" placeholder="e.g. Alice" maxlength="24" autocomplete="off" />
    </div>
    <div class="field">
      <label for="join-room">Room name</label>
      <input id="join-room" type="text" placeholder="e.g. my-secret-room" maxlength="64" autocomplete="off" />
    </div>
    <button id="join-btn">Join Room →</button>
    <p class="hint">Same room name = same chat. Share it with whoever you want to talk to.</p>
  </div>
</div>

<!-- HEADER -->
<div id="header">
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    ChitChatter Fork
  </div>
  <input id="room-display" type="text" readonly value="—" />
  <div id="status-pill">
    <div id="status-dot"></div>
    <span id="status-text">Waiting…</span>
  </div>
</div>

<!-- BODY -->
<div id="body">

  <!-- LEFT: VIDEO -->
  <div id="video-panel">
    <div id="video-grid">
      <!-- tiles injected here -->
    </div>
    <div id="media-controls">
      <button class="ctrl-btn" id="btn-cam"   title="Toggle camera"     disabled>📷</button>
      <button class="ctrl-btn" id="btn-mic"   title="Toggle microphone" disabled>🎤</button>
      <button class="ctrl-btn" id="btn-screen" title="Share screen"     disabled>🖥️</button>
      <button class="ctrl-btn danger" id="btn-hangup" title="Stop call" disabled>📵</button>
      <span id="call-label">Start camera to join video call</span>
    </div>
  </div>

  <!-- RIGHT: CHAT -->
  <div id="right-panel">
    <div id="sidebar">
      <div class="sidebar-label">Peers in room</div>
      <div id="peers-list"></div>
    </div>
    <div id="tracker-bar">
      <span class="t-label">Trackers:</span>
    </div>
    <div id="messages"></div>
    <div id="input-bar">
      <div id="nick-wrap">
        <label for="nickname">Nickname</label>
        <input id="nickname" type="text" maxlength="24" autocomplete="off" />
      </div>
      <textarea id="msg-input" rows="1" placeholder="Message… (Enter to send)"></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

</div>

<script type="module">
  import { joinRoom, selfId } from 'https://cdn.jsdelivr.net/npm/trystero@0.21.0/torrent/+esm';

  // ── Config ────────────────────────────────────────────────────────────────────
  const TRACKERS = [
    'wss://tracker.webtorrent.dev',
    'wss://tracker.openwebtorrent.com',
    'wss://tracker.files.fm:7073/announce',
  ];

  const RTC_CONFIG = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'turn:relay1.expressturn.com:3478', username: 'efQUQ79N77B5BNVVKF', credential: 'N4EAUgpjMzPLrxSS' },
    ],
  };

  // ── State ─────────────────────────────────────────────────────────────────────
  let room        = null;
  let sendMsg     = null;
  let sendNick    = null;
  let myNick      = 'Anonymous';
  let myRoom      = '';
  let localStream = null;   // camera/mic stream
  let screenStream = null;  // screen share stream
  let camOn       = false;
  let micOn       = false;
  let screenOn    = false;
  const peers     = new Map(); // peerId → { nick, videoTile }

  // ── DOM ───────────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const joinOverlay  = $('join-overlay');
  const joinNickEl   = $('join-nickname');
  const joinRoomEl   = $('join-room');
  const joinBtn      = $('join-btn');
  const roomDisplay  = $('room-display');
  const statusDot    = $('status-dot');
  const statusText   = $('status-text');
  const messagesEl   = $('messages');
  const peersListEl  = $('peers-list');
  const trackerBar   = $('tracker-bar');
  const nicknameEl   = $('nickname');
  const msgInput     = $('msg-input');
  const sendBtn      = $('send-btn');
  const videoGrid    = $('video-grid');
  const btnCam       = $('btn-cam');
  const btnMic       = $('btn-mic');
  const btnScreen    = $('btn-screen');
  const btnHangup    = $('btn-hangup');
  const callLabel    = $('call-label');

  // ── Tracker probe ─────────────────────────────────────────────────────────────
  const trackerState = {};
  TRACKERS.forEach(url => { trackerState[url] = 'pending'; });

  function renderTrackers() {
    const chips = TRACKERS.map(url => {
      const cls   = trackerState[url] === 'ok' ? 'ok' : trackerState[url] === 'err' ? 'err' : '';
      const short = url.replace('wss://','').split('/')[0];
      return `<span class="t-chip"><span class="t-dot ${cls}"></span>${short}</span>`;
    }).join('');
    trackerBar.innerHTML = `<span class="t-label">Trackers:</span>${chips}`;
  }
  renderTrackers();

  function probeTrackers() {
    TRACKERS.forEach(url => {
      try {
        const ws = new WebSocket(url);
        const t  = setTimeout(() => { ws.close(); }, 5000);
        ws.onopen  = () => { clearTimeout(t); trackerState[url] = 'ok';  renderTrackers(); ws.close(); };
        ws.onerror = () => { clearTimeout(t); trackerState[url] = 'err'; renderTrackers(); };
      } catch { trackerState[url] = 'err'; renderTrackers(); }
    });
  }

  // ── Peers list ────────────────────────────────────────────────────────────────
  function renderPeers() {
    let html = `<span class="peer-chip me"><span class="dot"></span>${escHtml(myNick)} (you)</span>`;
    peers.forEach(({ nick }, id) => {
      html += `<span class="peer-chip"><span class="dot"></span>${escHtml(nick || id.slice(0,8))}</span>`;
    });
    peersListEl.innerHTML = html;
    const n = peers.size + 1;
    statusText.textContent = `${n} peer${n !== 1 ? 's' : ''}`;
    statusDot.className = 'online';
  }

  // ── Messages ──────────────────────────────────────────────────────────────────
  function appendMsg(type, author, text, ts) {
    const time = new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    const div  = document.createElement('div');
    div.className = `msg ${type}`;
    if (type === 'system') {
      div.innerHTML = `<div class="msg-bubble">${escHtml(text)}</div>`;
    } else {
      div.innerHTML = `
        <div class="msg-meta"><span class="msg-author">${escHtml(author)}</span><span>${time}</span></div>
        <div class="msg-bubble">${escHtml(text)}</div>`;
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Video tiles ───────────────────────────────────────────────────────────────
  function makeTile(id, label, stream, muted) {
    const tile  = document.createElement('div');
    tile.className = 'video-tile';
    tile.dataset.peer = id;

    const video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    if (muted) video.muted = true;
    if (stream) video.srcObject = stream;

    const lbl = document.createElement('div');
    lbl.className = 'tile-label';
    lbl.textContent = label;

    const mic = document.createElement('div');
    mic.className = 'muted-icon';
    mic.textContent = '🔇 muted';

    tile.append(video, lbl, mic);
    return tile;
  }

  function getOrCreateLocalTile() {
    let tile = videoGrid.querySelector('[data-peer="local"]');
    if (!tile) {
      tile = makeTile('local', `${myNick} (you)`, localStream, true);
      videoGrid.prepend(tile);
    }
    return tile;
  }

  function removeTile(peerId) {
    const t = videoGrid.querySelector(`[data-peer="${peerId}"]`);
    if (t) t.remove();
  }

  // ── Media controls ────────────────────────────────────────────────────────────
  async function startCamera() {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      camOn = true; micOn = true;
      btnCam.classList.add('active');
      btnMic.classList.add('active');
      btnCam.disabled    = false;
      btnMic.disabled    = false;
      btnScreen.disabled = false;
      btnHangup.disabled = false;
      callLabel.textContent = 'Live';

      const tile = getOrCreateLocalTile();
      tile.querySelector('video').srcObject = localStream;

      // Share stream with all connected peers
      if (room) {
        peers.forEach((_, peerId) => {
          room.addStream(localStream, peerId);
        });
      }
    } catch (e) {
      callLabel.textContent = 'Camera access denied';
      console.error(e);
    }
  }

  function toggleCam() {
    if (!localStream) { startCamera(); return; }
    camOn = !camOn;
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    btnCam.classList.toggle('active', camOn);
    const tile = videoGrid.querySelector('[data-peer="local"]');
    if (tile) tile.classList.toggle('cam-off', !camOn);
  }

  function toggleMic() {
    if (!localStream) return;
    micOn = !micOn;
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    btnMic.classList.toggle('active', micOn);
    const tile = videoGrid.querySelector('[data-peer="local"]');
    if (tile) tile.classList.toggle('mic-muted', !micOn);
  }

  async function toggleScreen() {
    if (screenOn) {
      screenStream.getTracks().forEach(t => t.stop());
      screenStream = null;
      screenOn = false;
      btnScreen.classList.remove('active');
      callLabel.textContent = 'Live';
      // restore camera stream to peers
      if (room && localStream) {
        peers.forEach((_, peerId) => room.addStream(localStream, peerId));
      }
    } else {
      try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        screenOn = true;
        btnScreen.classList.add('active');
        callLabel.textContent = 'Sharing screen';
        screenStream.getVideoTracks()[0].onended = () => toggleScreen();
        if (room) {
          peers.forEach((_, peerId) => room.addStream(screenStream, peerId));
        }
      } catch (e) { console.warn('Screen share cancelled', e); }
    }
  }

  function hangup() {
    if (localStream)  { localStream.getTracks().forEach(t => t.stop());  localStream  = null; }
    if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
    camOn = false; micOn = false; screenOn = false;
    btnCam.classList.remove('active');
    btnMic.classList.remove('active');
    btnScreen.classList.remove('active');
    btnHangup.disabled = true;
    callLabel.textContent = 'Start camera to join video call';
    removeTile('local');
  }

  btnCam.addEventListener('click',    toggleCam);
  btnMic.addEventListener('click',    toggleMic);
  btnScreen.addEventListener('click', toggleScreen);
  btnHangup.addEventListener('click', hangup);

  // ── Join room ─────────────────────────────────────────────────────────────────
  function doJoin(nick, roomName) {
    myNick  = nick.trim()     || 'Anonymous';
    myRoom  = roomName.trim() || 'general';

    joinOverlay.style.display = 'none';
    roomDisplay.value  = myRoom;
    nicknameEl.value   = myNick;
    sendBtn.disabled   = false;
    btnCam.disabled    = false;
    statusText.textContent = 'Connecting…';
    localStorage.setItem('cc_nick', myNick);
    localStorage.setItem('cc_room', myRoom);

    probeTrackers();

    room = joinRoom(
      { appId: 'chitchatter-fork-v1', relayUrls: TRACKERS, rtcConfig: RTC_CONFIG },
      myRoom
    );

    [sendMsg]  = room.makeAction('msg');
    [sendNick] = room.makeAction('nick');
    const [, receiveNick] = room.makeAction('nick');
    const [, receiveMsg]  = room.makeAction('msg');

    // ── Incoming video streams from peers ──────────────────────────────────────
    room.onPeerStream((stream, peerId, metadata) => {
      const peerData = peers.get(peerId) || {};
      const label    = peerData.nick || peerId.slice(0,8);
      let tile = videoGrid.querySelector(`[data-peer="${peerId}"]`);
      if (!tile) {
        tile = makeTile(peerId, label, stream, false);
        videoGrid.appendChild(tile);
        peers.set(peerId, { ...peerData, videoTile: tile });
      } else {
        tile.querySelector('video').srcObject = stream;
      }
    });

    room.onPeerJoin(peerId => {
      peers.set(peerId, { nick: '', videoTile: null });
      renderPeers();
      appendMsg('system', '', 'A peer joined the room', Date.now());
      // send our nickname
      sendNick({ nick: myNick }, peerId);
      // share our stream if already live
      if (localStream)  room.addStream(localStream,  peerId);
      if (screenStream) room.addStream(screenStream, peerId);
    });

    room.onPeerLeave(peerId => {
      const peerData = peers.get(peerId) || {};
      const label    = peerData.nick || peerId.slice(0,8);
      removeTile(peerId);
      peers.delete(peerId);
      renderPeers();
      appendMsg('system', '', `${label} left the room`, Date.now());
    });

    receiveNick(({ nick }, peerId) => {
      const existing = peers.get(peerId) || {};
      peers.set(peerId, { ...existing, nick });
      // update tile label if present
      const tile = videoGrid.querySelector(`[data-peer="${peerId}"]`);
      if (tile) tile.querySelector('.tile-label').textContent = nick;
      renderPeers();
    });

    receiveMsg(({ author, text, ts }, _peerId) => {
      appendMsg('theirs', author, text, ts);
    });

    renderPeers();
    appendMsg('system', '', `You joined room "${myRoom}" as ${myNick}`, Date.now());
  }

  // ── Send message ──────────────────────────────────────────────────────────────
  function doSend() {
    const text = msgInput.value.trim();
    if (!text || !sendMsg) return;
    const ts = Date.now();
    sendMsg({ author: myNick, text, ts });
    appendMsg('mine', myNick, text, ts);
    msgInput.value = '';
    msgInput.style.height = 'auto';
  }

  // ── Events ────────────────────────────────────────────────────────────────────
  joinBtn.addEventListener('click', () => doJoin(joinNickEl.value, joinRoomEl.value));
  [joinNickEl, joinRoomEl].forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doJoin(joinNickEl.value, joinRoomEl.value); })
  );

  sendBtn.addEventListener('click', doSend);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  });
  nicknameEl.addEventListener('change', () => {
    myNick = nicknameEl.value.trim() || 'Anonymous';
    localStorage.setItem('cc_nick', myNick);
    const localTile = videoGrid.querySelector('[data-peer="local"] .tile-label');
    if (localTile) localTile.textContent = `${myNick} (you)`;
    renderPeers();
  });

  // ── Restore session ───────────────────────────────────────────────────────────
  const savedNick = localStorage.getItem('cc_nick') || '';
  const savedRoom = localStorage.getItem('cc_room') || '';
  if (savedNick) joinNickEl.value = savedNick;
  if (savedRoom) joinRoomEl.value = savedRoom;
  joinNickEl.focus();
</script>
</body>
</html>
